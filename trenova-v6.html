<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRENOVA TERMINAL v6</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   TRENOVA v6 — BLOOMBERG AMBER DARK
════════════════════════════════════════ */
:root{
  /* Bloomberg DNA: amber on near-black */
  --bg:    #080a0d;
  --bg2:   #0c0f14;
  --bg3:   #101418;
  --bg4:   #141920;
  --bg5:   #181e27;
  --bdr:   #1a2230;
  --bdr2:  #223040;

  /* Primary accent: amber/gold (Bloomberg) */
  --a:     #ffb800;
  --a2:    #cc9200;
  --a3:    #ffcf4d;
  --a-dim: rgba(255,184,0,.12);

  /* Secondary accents */
  --c:  #00d4ff;   /* cyan  */
  --g:  #00e676;   /* green */
  --g2: #00b84a;
  --r:  #ff3355;   /* red   */
  --r2: #cc1133;
  --t:  #00ccaa;   /* teal  */
  --p:  #bb44ff;   /* purple*/
  --o:  #ff7733;   /* orange*/
  --pk: #ff44aa;   /* pink  */

  /* Text */
  --w:   #e8dfc0;  /* warm white — bloomberg text */
  --w2:  #c4b890;
  --d:   #6a7a60;
  --dd:  #364030;
  --ghost: #0e1318;

  /* Glows */
  --ga:  rgba(255,184,0,.09);
  --gc:  rgba(0,212,255,.08);
  --gg:  rgba(0,230,118,.07);
  --gr:  rgba(255,51,85,.07);

  --panel-sh: 0 8px 40px rgba(0,0,0,.85), 0 0 0 1px var(--bdr2);
  --title-h: 28px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--w);
  font-size: 10px;
  display: flex;
  flex-direction: column;
}

/* scanline */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px
  );
  pointer-events: none; z-index: 9999;
}

/* ── TOP BAR ── */
#topbar {
  height: 32px;
  background: var(--bg2);
  border-bottom: 1px solid var(--bdr2);
  display: flex; align-items: center;
  flex-shrink: 0; position: relative; z-index: 300;
}
.logo {
  width: 152px; padding: 0 12px; height: 100%;
  display: flex; align-items: center; gap: 8px;
  border-right: 1px solid var(--bdr2); flex-shrink: 0;
}
.logo-t {
  font-family: 'Orbitron'; font-size: 13px; font-weight: 900;
  color: var(--a);
  letter-spacing: 3px;
  text-shadow: 0 0 16px rgba(255,184,0,.5), 0 0 40px rgba(255,184,0,.2);
}
.logo-v { font-size: 6px; color: var(--d); letter-spacing: 2px; margin-top: 1px; }

.ticker-band { flex: 1; overflow: hidden; position: relative; }
.ticker-band::before, .ticker-band::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 28px; z-index: 2;
}
.ticker-band::before { left: 0; background: linear-gradient(90deg, var(--bg2), transparent); }
.ticker-band::after  { right: 0; background: linear-gradient(-90deg, var(--bg2), transparent); }
.ticker-inner {
  display: flex; align-items: center; height: 32px;
  animation: ticker 100s linear infinite; white-space: nowrap;
}
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.tk {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 0 12px; border-right: 1px solid var(--bdr);
  cursor: pointer; height: 100%; transition: background .1s;
}
.tk:hover { background: var(--bg3); }
.tk-s { font-size: 8px; font-weight: 600; color: var(--w); font-family: 'Rajdhani'; }
.tk-p { font-size: 9px; color: var(--a); }
.tk-c { font-size: 8px; font-weight: 600; }
.tk-c.up { color: var(--g); }
.tk-c.dn { color: var(--r); }

.topbar-right {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; border-left: 1px solid var(--bdr2); height: 100%; flex-shrink: 0;
}
.se { display: flex; align-items: center; gap: 3px; font-size: 7px; color: var(--d); font-family: 'Rajdhani'; font-weight: 700; }
.se-dot { width: 5px; height: 5px; border-radius: 50%; }
.se-dot.on { animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
#clk { font-family: 'Orbitron'; font-size: 11px; color: var(--a); letter-spacing: 2px; }
#dts { font-size: 6px; color: var(--d); }
.live-led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--g); box-shadow: 0 0 8px var(--g);
  animation: blink 2s infinite;
}
#api-status {
  font-size: 7px; padding: 2px 6px; border-radius: 1px;
  font-family: 'Rajdhani'; font-weight: 700; letter-spacing: 1px;
}
#api-status.live { color: var(--g); border: 1px solid var(--g); background: var(--gg); }
#api-status.sim  { color: var(--a); border: 1px solid var(--a); background: var(--ga); }

/* ── TOOLBAR ── */
#toolbar {
  height: 36px;
  background: var(--bg2);
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center;
  padding: 0 8px; gap: 2px;
  flex-shrink: 0; z-index: 8000;
  overflow: visible;
  position: relative;
}

/* Dropdown group */
.tg {
  position: relative; flex-shrink: 0;
}
.tg-sep {
  width: 1px; height: 18px;
  background: var(--bdr2); margin: 0 4px; flex-shrink: 0;
}

/* Main nav button (the category label) */
.tgl-btn {
  display: flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 13px;
  font-family: 'Rajdhani'; font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--w2);
  cursor: pointer; background: none; border: none;
  transition: all .12s; white-space: nowrap;
  border-bottom: 2px solid transparent;
}
.tgl-btn:hover, .tg.open .tgl-btn {
  color: var(--a); background: var(--ga);
  border-bottom-color: var(--a);
}
.tgl-btn .arr {
  font-size: 8px; margin-top: 1px; opacity: .45;
  transition: transform .15s;
}
.tg.open .tgl-btn .arr { transform: rotate(180deg); opacity: 1; }

/* Color variants */
.tgl-btn.c:hover, .tg.open .tgl-btn.c { color: var(--c); background: var(--gc); border-bottom-color: var(--c); }
.tgl-btn.g:hover, .tg.open .tgl-btn.g { color: var(--g); background: var(--gg); border-bottom-color: var(--g); }
.tgl-btn.r:hover, .tg.open .tgl-btn.r { color: var(--r); background: var(--gr); border-bottom-color: var(--r); }
.tgl-btn.t:hover, .tg.open .tgl-btn.t { color: var(--t); background: rgba(0,204,170,.07); border-bottom-color: var(--t); }
.tgl-btn.p:hover, .tg.open .tgl-btn.p { color: var(--p); background: rgba(187,68,255,.07); border-bottom-color: var(--p); }
.tgl-btn.am { color: var(--a); border-bottom-color: var(--a); background: var(--ga); }
.tgl-btn.am:hover { color: var(--a3); }

/* Dropdown panel */
.tg-drop {
  display: none;
  position: absolute; top: 36px; left: 0;
  background: var(--bg3);
  border: 1px solid var(--bdr2);
  border-top: 2px solid var(--a);
  min-width: 200px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 9000;
  padding: 4px 0;
  box-shadow: 0 12px 40px rgba(0,0,0,.9), 0 0 0 1px rgba(255,184,0,.08);
}
.tg-drop::-webkit-scrollbar { width: 3px; }
.tg-drop::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px; }
.tg.open .tg-drop { display: block; }

/* Dropdown color top border */
.tg-drop.c { border-top-color: var(--c); }
.tg-drop.g { border-top-color: var(--g); }
.tg-drop.r { border-top-color: var(--r); }
.tg-drop.t { border-top-color: var(--t); }
.tg-drop.p { border-top-color: var(--p); }
.tg-drop.am { border-top-color: var(--a); }

/* Dropdown header label */
.drop-lbl {
  font-size: 9px; color: var(--d);
  font-family: 'Rajdhani'; font-weight: 700; letter-spacing: 2px;
  padding: 6px 14px 5px; border-bottom: 1px solid var(--bdr);
  margin-bottom: 3px; text-transform: uppercase;
}

/* Dropdown items */
.tb {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 14px;
  font-size: 12px; font-family: 'Rajdhani'; font-weight: 700;
  letter-spacing: .8px; color: var(--w2);
  cursor: pointer; background: none; border: none;
  transition: all .08s; white-space: nowrap; text-align: left;
  line-height: 1;
}
.tb:hover { background: var(--bg5); color: var(--a); padding-left: 18px; }
.tb.c:hover { color: var(--c); }
.tb.g:hover { color: var(--g); }
.tb.r:hover { color: var(--r); border-top: 1px solid var(--bdr); margin-top: 2px; padding-top: 10px; }
.tb.t:hover { color: var(--t); }
.tb.p:hover { color: var(--p); }
.tb.am { color: var(--a); }
.tb.am:hover { color: var(--a3); background: var(--ga); }

/* ── DESKTOP ── */
#desktop {
  flex: 1; position: relative; overflow: hidden;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse at 15% 15%, rgba(255,184,0,.025) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, rgba(0,212,255,.015) 0%, transparent 55%);
}

/* ── FLOATING PANEL ── */
.panel {
  position: absolute;
  display: flex; flex-direction: column;
  background: var(--bg2);
  border: 1px solid var(--bdr2);
  border-radius: 2px;
  box-shadow: var(--panel-sh);
  min-width: 200px; min-height: 120px;
  z-index: 100;
  overflow: hidden;
  transition: box-shadow .12s;
}
.panel.focused {
  z-index: 150;
  box-shadow: 0 12px 50px rgba(0,0,0,.9), 0 0 0 1px var(--a), 0 0 24px rgba(255,184,0,.07);
}
.panel.minimized > .panel-body { display: none !important; }
.panel-title {
  height: var(--title-h);
  display: flex; align-items: center;
  padding: 0 8px; gap: 5px;
  background: var(--bg3);
  border-bottom: 1px solid var(--bdr);
  cursor: move; flex-shrink: 0;
  position: relative;
}
.panel-title::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--a);
}
.pt-ico { font-size: 10px; flex-shrink: 0; margin-left: 2px; }
.pt-name {
  font-family: 'Rajdhani'; font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; color: var(--a); flex: 1;
}
.pt-tag { font-size: 6px; padding: 1px 4px; border: 1px solid currentColor; border-radius: 1px; }
.pt-tag.live { color: var(--g); animation: blink 2s infinite; }
.pt-tag.sim  { color: var(--a); }
.pt-btns { display: flex; gap: 2px; }
.pt-btn {
  width: 13px; height: 13px; border-radius: 50%;
  border: none; cursor: pointer; font-size: 7px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; transition: filter .1s;
}
.pt-btn:hover { filter: brightness(1.4); }
.btn-min  { background: #555; color: #aaa; }
.btn-max  { background: #004499; color: #88aaff; }
.btn-cls  { background: var(--r2); color: #ffaaaa; }

.panel-body { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.resize-h {
  position: absolute; bottom: 0; right: 0;
  width: 14px; height: 14px; cursor: nwse-resize; z-index: 5;
}
.resize-h::after {
  content: '';
  position: absolute; bottom: 3px; right: 3px;
  width: 6px; height: 6px;
  border-right: 1px solid var(--bdr2);
  border-bottom: 1px solid var(--bdr2);
}

/* ── SHARED COMPONENTS ── */
.ph {
  height: 20px; background: var(--bg3);
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center;
  padding: 0 8px; gap: 5px; flex-shrink: 0;
}
.ph-t { font-family: 'Rajdhani'; font-size: 8px; font-weight: 700; letter-spacing: 2px; color: var(--a); }
.ph-b { font-size: 6px; padding: 1px 4px; border: 1px solid currentColor; border-radius: 1px; }
.ph-b.live { color: var(--g); animation: blink 2s infinite; }
.ph-b.sim  { color: var(--a); }
.ph-ml { margin-left: auto; }

.ptabs { display: flex; background: var(--bg3); border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
.ptab {
  padding: 4px 9px; font-family: 'Rajdhani'; font-size: 8px; font-weight: 700;
  letter-spacing: 1px; color: var(--d); cursor: pointer;
  border-bottom: 2px solid transparent; background: none;
  border-top: none; border-left: none; border-right: none;
  transition: all .1s;
}
.ptab:hover { color: var(--w2); }
.ptab.on { color: var(--a); border-bottom-color: var(--a); }

.scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.scroll::-webkit-scrollbar { width: 2px; }
.scroll::-webkit-scrollbar-thumb { background: var(--ghost); }

/* color helpers */
.up  { color: var(--g); }
.dn  { color: var(--r); }
.neu { color: var(--d); }
.am  { color: var(--a); }

/* ── MARKET STRIP (10-wide) ── */
.mstrip-grid {
  display: grid; grid-template-columns: repeat(10, 1fr);
  gap: 1px; background: var(--bdr); height: 100%;
}
.mcard {
  background: var(--bg3); padding: 5px 7px;
  display: flex; flex-direction: column; justify-content: space-between;
  cursor: pointer; transition: background .1s; position: relative; overflow: hidden;
}
.mcard::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; opacity: .7;
}
.mcard:hover { background: var(--bg4); }
.mcard.up::after { background: var(--g); }
.mcard.dn::after { background: var(--r); }
.mcard.neu::after { background: var(--d); }
.mcard-lb { font-size: 6px; color: var(--d); letter-spacing: 1.5px; font-family: 'Rajdhani'; font-weight: 700; }
.mcard-v  { font-family: 'Orbitron'; font-size: 11px; font-weight: 700; color: var(--w); margin-top: 2px; }
.mcard-ch { font-size: 8px; font-weight: 700; font-family: 'Rajdhani'; margin-top: 1px; }
.mcard-sub { font-size: 6px; color: var(--d); }

/* ── WATCHLIST ── */
.wl-row {
  display: grid; grid-template-columns: 1fr 34px 62px;
  padding: 4px 7px; border-bottom: 1px solid rgba(26,34,48,.8);
  cursor: pointer; transition: background .08s; align-items: center; gap: 3px;
}
.wl-row:hover, .wl-row.sel { background: var(--bg4); }
.wl-row.sel { border-left: 2px solid var(--a); padding-left: 5px; }
.wr-s { font-family: 'Rajdhani'; font-size: 10px; font-weight: 700; color: var(--w); }
.wr-n { font-size: 6px; color: var(--d); }
.wr-p { font-size: 8px; font-weight: 600; text-align: right; color: var(--a); }
.wr-c { font-size: 7px; font-weight: 700; text-align: right; }
.wr-sg { font-size: 6px; font-weight: 700; text-align: right; letter-spacing: .5px; }

/* ── ORDER BOOK ── */
.ob-head { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 2px 8px; font-size: 6px; color: var(--d); border-bottom: 1px solid var(--ghost); }
.ob-row  { display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 2px 8px; position: relative; cursor: pointer; }
.ob-row:hover { filter: brightness(1.35); }
.ob-fill { position: absolute; top: 0; bottom: 0; right: 0; opacity: .12; }
.ob-ask .ob-fill { background: var(--r); }
.ob-bid .ob-fill { background: var(--g); }
.ob-ask .ob-p { color: var(--r); font-weight: 700; font-size: 8px; }
.ob-bid .ob-p { color: var(--g); font-weight: 700; font-size: 8px; }
.ob-s, .ob-t { font-size: 7px; color: var(--d); text-align: right; }
.ob-mid { text-align: center; padding: 3px; background: var(--bg3); font-family: 'Orbitron'; font-size: 8px; color: var(--a); border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr); }

/* ── HEATMAP ── */
.hm-wrap {
  display: grid; gap: 1px; background: var(--bdr);
  margin: 4px; border-radius: 2px; overflow: hidden;
}
.hm-c {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer; transition: filter .12s; padding: 4px 2px;
}
.hm-c:hover { filter: brightness(1.3); }
.hm-s { font-family: 'Rajdhani'; font-size: 8px; font-weight: 700; color: #fff; }
.hm-p { font-size: 7px; font-weight: 700; color: #fff; }

/* ── SCREENER ── */
.scr-head {
  padding: 5px 8px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
  border-bottom: 1px solid var(--bdr); background: var(--bg3); flex-shrink: 0;
}
.sf {
  font-size: 7px; padding: 2px 7px; border: 1px solid var(--bdr); border-radius: 1px;
  color: var(--d); cursor: pointer; background: none;
  font-family: 'Rajdhani'; font-weight: 700; transition: all .1s;
}
.sf:hover, .sf.on { border-color: var(--a); color: var(--a); background: var(--ga); }
.scr-tbl { width: 100%; border-collapse: collapse; }
.scr-tbl th {
  position: sticky; top: 0; background: var(--bg3);
  padding: 3px 7px; text-align: left; font-size: 6px;
  color: var(--d); letter-spacing: 1px; border-bottom: 1px solid var(--bdr2);
  cursor: pointer; font-family: 'Rajdhani'; font-weight: 700;
}
.scr-tbl th:hover { color: var(--a); }
.scr-tbl td { padding: 3px 7px; border-bottom: 1px solid rgba(26,34,48,.5); }
.scr-tbl tr:hover td { background: var(--bg4); }
.sr-sym { font-family: 'Rajdhani'; font-weight: 700; color: var(--w); cursor: pointer; font-size: 9px; }
.sr-sym:hover { color: var(--a); }
.spill { font-size: 6px; font-weight: 700; letter-spacing: .5px; padding: 1px 4px; border-radius: 1px; }
.sp-sb  { background: rgba(0,230,118,.1); color: var(--g); border: 1px solid rgba(0,230,118,.25); }
.sp-b   { background: rgba(0,204,170,.08); color: var(--t); border: 1px solid rgba(0,204,170,.2); }
.sp-n   { background: rgba(106,122,96,.07); color: var(--d); border: 1px solid rgba(106,122,96,.15); }
.sp-s   { background: rgba(255,119,51,.08); color: var(--o); border: 1px solid rgba(255,119,51,.2); }
.sp-ss  { background: rgba(255,51,85,.08); color: var(--r); border: 1px solid rgba(255,51,85,.2); }
.score-ring { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-family: 'Orbitron'; font-size: 7px; font-weight: 700; border: 1px solid currentColor; }

/* ── MARKET STRUCTURE ── */
.ms-item { padding: 6px 8px; border-bottom: 1px solid rgba(26,34,48,.7); }
.ms-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
.ms-sym { font-family: 'Rajdhani'; font-size: 9px; font-weight: 700; color: var(--w); }
.ms-bias { font-size: 6px; font-weight: 700; padding: 1px 4px; border-radius: 1px; letter-spacing: .5px; }
.ms-bias.bull { background: rgba(0,230,118,.1); color: var(--g); }
.ms-bias.bear { background: rgba(255,51,85,.08); color: var(--r); }
.ms-bias.neu  { background: rgba(106,122,96,.07); color: var(--d); }
.ms-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
.mst { font-size: 6px; padding: 1px 4px; border-radius: 1px; font-weight: 700; }
.mst-bos   { background: rgba(0,230,118,.08); color: var(--g); border: 1px solid rgba(0,230,118,.15); }
.mst-choch { background: rgba(255,184,0,.08); color: var(--a); border: 1px solid rgba(255,184,0,.15); }
.mst-lg    { background: rgba(0,212,255,.08); color: var(--c); border: 1px solid rgba(0,212,255,.15); }
.mst-ob    { background: rgba(187,68,255,.08); color: var(--p); border: 1px solid rgba(187,68,255,.15); }
.mst-fvg   { background: rgba(0,204,170,.07); color: var(--t); border: 1px solid rgba(0,204,170,.15); }
.ms-lvls { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; margin-top: 4px; }
.ms-lvl { background: var(--bg3); padding: 3px 5px; border-radius: 1px; }
.ms-lt { font-size: 5px; color: var(--d); font-family: 'Rajdhani'; font-weight: 700; }
.ms-lv { font-size: 8px; font-weight: 600; }

/* ── ALTCOIN HUNTER ── */
.ah-card {
  padding: 7px 9px; border-bottom: 1px solid rgba(26,34,48,.7);
  cursor: pointer; transition: background .1s;
}
.ah-card:hover { background: var(--bg4); }
.ah-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.ah-sym { font-family: 'Rajdhani'; font-size: 11px; font-weight: 700; color: var(--w); }
.ah-grade { font-family: 'Orbitron'; font-size: 14px; font-weight: 700; }
.ah-metrics { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; }

const $ = id => document.getElementById(id);

function fp(s, p) {
  if(p>=10000) return '$'+p.toLocaleString('en-US',{maximumFractionDigits:0});
  if(p>=100)   return '$'+p.toFixed(2);
  if(p>=1)     return '$'+p.toFixed(3);
  if(p>=0.001) return '$'+p.toFixed(4);
  return '$'+p.toFixed(7);
}
function fc(c) { return (c>=0?'+':'')+c.toFixed(2)+'%'; }
function fv(v) { return v>=1?'$'+v.toFixed(1)+'B':'$'+(v*1000).toFixed(0)+'M'; }

function spark(c, w=36, h=20) {
  let pts=[]; let y=h/2;
  for(let i=0;i<12;i++){
    y = Math.max(2, Math.min(h-2, y + (Math.random()-.48)*3.5 + (c>0?.15:-.15)));
    pts.push(`${i*(w/11)},${y}`);
  }
  const col = c>=0?'var(--g)':'var(--r)';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.2" opacity=".85"/></svg>`;
}

function op(type) {
  if(panels[type]) { focus(type); return; }

  const desk = $('desktop');
  const dw = desk.clientWidth, dh = desk.clientHeight;
  const n = Object.keys(panels).length;

  const y = Math.min(40+n*22, dh-def.h-20);

  const el = document.createElement('div');

  el.id = 'panel-'+type;
  el.style.cssText = `left:${x}px;top:${y}px;width:${def.w}px;height:${def.h}px;`;
  const isLive = ['tv_btc','tv_eth','tv_custom','watchlist','mstrip'].includes(type);
  el.innerHTML = `

      <span class="pt-ico">${def.ico}</span>

        <div class="pt-btn btn-max" onclick="maxP('${type}')">□</div>
        <div class="pt-btn btn-cls" onclick="cls_p('${type}')">✕</div>
      </div>
    </div>

    <div class="resize-h" data-p="${type}"></div>
  `;
  desk.appendChild(el);
  panels[type] = {el, type, charts:{}, chartjs:{}};
  sv('sb-p', Object.keys(panels).length);
  makeDrag(el, type);
  makeResize(el, type);
  focus(type);
  renderP(type);
}

function cls_p(t) {
  const p = panels[t]; if(!p) return;
  if(p.charts) Object.values(p.charts).forEach(c=>{try{c.remove();}catch(e){}});
  if(p.chartjs) Object.values(p.chartjs).forEach(c=>{try{c.destroy();}catch(e){}});
  p.el.remove(); delete panels[t];
  sv('sb-p', Object.keys(panels).length);
}
function focus(t) {
  Object.values(panels).forEach(p=>p.el.classList.remove('focused'));
  if(panels[t]) { panels[t].el.classList.add('focused'); panels[t].el.style.zIndex=++pZ; }
}
function minP(t) {
  const p=panels[t]; if(!p) return;
  p.el.classList.toggle('minimized');
  p.el.style.height = p.el.classList.contains('minimized') ? '28px' : (PDEFS[t]?.h||400)+'px';
}
function maxP(t) {
  const p=panels[t]; if(!p) return;
  const desk=$('desktop');
  if(!p._max) {
    p._prev = {l:p.el.style.left,to:p.el.style.top,w:p.el.style.width,h:p.el.style.height};
    p.el.style.cssText += `left:0;top:0;width:${desk.clientWidth}px;height:${desk.clientHeight}px;`;
    p._max=true;
  } else {
    p.el.style.left=p._prev.l; p.el.style.top=p._prev.to;
    p.el.style.width=p._prev.w; p.el.style.height=p._prev.h;
    p._max=false;
  }
  setTimeout(()=>rcCharts(t),60);
}
function cls_all() { Object.keys(panels).forEach(t=>cls_p(t)); }

function rcCharts(t) {
  const p=panels[t]; if(!p) return;
  Object.entries(p.charts||{}).forEach(([id,c])=>{
    const h=$(id); if(h&&c) try{c.applyOptions({width:h.clientWidth,height:h.clientHeight});}catch(e){}
  });
}

function makeDrag(el, t) {
  const title = el.querySelector('.panel-title');
  let dx, dy, on=false;
  title.addEventListener('mousedown', e => {
    if(e.target.classList.contains('pt-btn')) return;
    on=true; dx=e.clientX-el.offsetLeft; dy=e.clientY-el.offsetTop;
    focus(t);
    const mv = e2 => {
      if(!on) return;
      const desk=$('desktop');
      el.style.left = Math.max(0, Math.min(desk.clientWidth-el.offsetWidth, e2.clientX-dx))+'px';
      el.style.top  = Math.max(0, Math.min(desk.clientHeight-el.offsetHeight, e2.clientY-dy))+'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', ()=>{on=false;document.removeEventListener('mousemove',mv);},{once:true});
  });
}

function makeResize(el, t) {
  const h = el.querySelector('.resize-h');
  let rx,ry,rw,rh,on=false;
  h.addEventListener('mousedown', e => {
    on=true; rx=e.clientX; ry=e.clientY; rw=el.offsetWidth; rh=el.offsetHeight;
    const mv = e2 => {
      if(!on) return;
      el.style.width  = Math.max(200, rw+(e2.clientX-rx))+'px';
      el.style.height = Math.max(120, rh+(e2.clientY-ry))+'px';
    };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', ()=>{on=false;document.removeEventListener('mousemove',mv);rcCharts(t);},{once:true});
  });
}

  const mxT=Math.max(asks[asks.length-1].t,bids[bids.length-1].t);

          <div class="ah-bar"><div class="ah-fill" style="width:${x.mom}%;background:${x.mom>=60?'var(--g)':x.mom>=40?'var(--a)':'var(--r)'}"></div></div>
        </div>
        <div class="ah-m">
          <div class="ah-ml">VOL SCORE</div>
          <div class="ah-mv" style="color:${x.vol>=60?'var(--g)':x.vol>=40?'var(--a)':'var(--r)'}">${x.vol}</div>
          <div class="ah-bar"><div class="ah-fill" style="width:${x.vol}%;background:${x.vol>=60?'var(--g)':x.vol>=40?'var(--a)':'var(--r)'}"></div></div>
        </div>
        <div class="ah-m">
          <div class="ah-ml">ON-CHAIN</div>

function buildScr(p) {
  const tb=$('scr-rows'); if(!tb) return;
  const structs=['BOS+Retest','CHoCH','Liq.Grab','Order Blk','FVG','Breakout','Range','—'];
  let data = PAIRS.map(p2 => {
    const d=T.prices[p2.s];
    const rsi=25+Math.random()*65, macd=(Math.random()-.3)*300;
    const vs=Math.random()*3, fund=(Math.random()-.3)*.0008;
    const oiCh=(Math.random()-.3)*25, c7d=(Math.random()*50-15).toFixed(1);
    let sc=50+d.c*2+Math.random()*20-10;
    if(rsi<30)sc+=14; if(rsi>70)sc-=12; if(vs>2)sc+=10; if(fund>0.0003)sc-=5;
    sc=Math.round(Math.max(0,Math.min(100,sc)));
    return{...p2,d,rsi,macd,vs,fund,oiCh,c7d,sc};
  });
  const f=p._sf, s=p._ss;
  if(f==='bull')data=data.filter(x=>x.sc>=55&&x.d.c>0);
  else if(f==='bear')data=data.filter(x=>x.sc<45&&x.d.c<0);
  else if(f==='breakout')data=data.filter(x=>x.vs>1.8&&x.d.c>3);
  else if(f==='oversold')data=data.filter(x=>x.rsi<33);
  else if(f==='overbought')data=data.filter(x=>x.rsi>70);
  else if(f==='highfund')data=data.filter(x=>Math.abs(x.fund)>.0003);
  if(s==='score')data.sort((a,b)=>b.sc-a.sc);
  else if(s==='change')data.sort((a,b)=>b.d.c-a.d.c);
  else if(s==='volume')data.sort((a,b)=>b.d.v-a.d.v);
  else if(s==='fund')data.sort((a,b)=>Math.abs(b.fund)-Math.abs(a.fund));
  else if(s==='oi')data.sort((a,b)=>b.oiCh-a.oiCh);

  const sc_c=x=>x.sc>=70?'var(--g)':x.sc>=50?'var(--a)':x.sc>=35?'var(--o)':'var(--r)';
  const spill=x=>{
    if(x.sc>=75&&x.d.c>0) return '<span class="spill sp-sb">STR BUY</span>';
    if(x.sc>=60&&x.d.c>0) return '<span class="spill sp-b">BUY</span>';
    if(x.sc<=25&&x.d.c<0) return '<span class="spill sp-ss">STR SELL</span>';
    if(x.sc<=40&&x.d.c<0) return '<span class="spill sp-s">SELL</span>';
    return '<span class="spill sp-n">NEUTRAL</span>';
  };
  tb.innerHTML = data.map((x,i)=>`<tr>
    <td style="color:var(--d)">${i+1}</td>
    <td><div class="sr-sym" onclick="T.sel='${x.s}'">${x.s}/USDT</div><div style="font-size:6px;color:var(--d)">${x.cat}</div></td>
    <td style="font-size:8px;font-weight:600;color:var(--a)">${fp(x.s,x.d.p)}</td>
    <td class="${x.d.c>=0?'up':'dn'}" style="font-size:8px;font-weight:700">${fc(x.d.c)}</td>
    <td class="${parseFloat(x.c7d)>=0?'up':'dn'}" style="font-size:8px">${parseFloat(x.c7d)>=0?'+':''}${x.c7d}%</td>
    <td style="font-size:7px;color:var(--d)">${fv(x.d.v)}</td>
    <td style="font-size:7px;color:var(--d)">${x.d.mc>=1?x.d.mc.toFixed(0)+'B':Math.round(x.d.mc*1000)+'M'}</td>
    <td style="font-size:8px;font-weight:700;color:${x.rsi>70?'var(--r)':x.rsi<33?'var(--g)':'var(--d)'}">${x.rsi.toFixed(0)}</td>
    <td style="font-size:7px;color:${x.macd>0?'var(--g)':'var(--r)'}">${x.macd>0?'▲':'▼'}${Math.abs(x.macd).toFixed(0)}</td>
    <td style="font-size:7px;font-weight:700;color:${x.fund>=0?'var(--g)':'var(--r)'}">${x.fund>=0?'+':''}${(x.fund*100).toFixed(4)}%</td>
    <td style="font-size:7px;color:${x.oiCh>=0?'var(--g)':'var(--r)'}">${x.oiCh>=0?'+':''}${x.oiCh.toFixed(1)}%</td>
    <td style="font-size:7px;color:var(--d)">${structs[Math.floor(Math.random()*structs.length)]}</td>
    <td>${spill(x)}</td>
    <td><div style="display:flex;align-items:center;gap:2px"><div style="width:32px;height:4px;background:var(--ghost);border-radius:1px;overflow:hidden"><div style="width:${x.sc}%;height:100%;background:${sc_c(x)}"></div></div><span style="font-size:7px;color:${sc_c(x)};font-weight:700">${x.sc}</span></div></td>

function doC(){
  const acc=+$('c-acc')?.value,risk=+$('c-risk')?.value,entry=+$('c-entry')?.value||T.prices[T.sel]?.p||0;
  const sl=+$('c-sl')?.value,tp=+$('c-tp')?.value,lev=+$('c-lev')?.value||1,dir=$('c-dir')?.value;
  if(!sl||!entry)return;
  const rA=acc*(risk/100),slD=Math.abs(entry-sl)/entry,pos=rA/(slD*lev),not=pos*lev;
  const maxP=tp?pos*Math.abs(tp-entry)/entry*lev:0,rr=tp?Math.abs(tp-entry)/Math.abs(entry-sl):0;
  const liq=dir==='long'?entry*(1-1/lev*.9):entry*(1+1/lev*.9);
  sv('cr-pos','$'+pos.toFixed(2));sv('cr-not','$'+not.toFixed(2));sv('cr-loss','-$'+rA.toFixed(2));sv('cr-prof',tp?'+$'+maxP.toFixed(2):'—');sv('cr-rr',tp?rr.toFixed(2)+'R':'—');sv('cr-liq',fp(T.sel,liq));
  const w=$('cr-warn');if(w){if(lev>20)w.innerHTML=`<span style="color:var(--o)">⚠ Leverage ${lev}x — HIGH RISK. Max recommended: 20x</span>`;else if(risk>3)w.innerHTML=`<span style="color:var(--o)">⚠ Risk ${risk}% exceeds 1-2% conservative guideline</span>`;else w.innerHTML=`<span style="color:var(--g)">✓ Risk parameters within recommended range</span>`;}
}
function doP(){
  const e=+$('p-entry')?.value,x=+$('p-exit')?.value,sz=+$('p-size')?.value||100,lv=+$('p-lev')?.value||1,dir=$('p-dir')?.value;
  if(!e||!x)return;
  const pct=dir==='long'?(x-e)/e*100:(e-x)/e*100,usdt=sz*(pct/100)*lv,roe=pct*lv,fees=sz*.0004*2*lv;
  sv('pp-usdt',(usdt>=0?'+$':'-$')+Math.abs(usdt).toFixed(2));
  sv('pp-pct',(pct>=0?'+':'')+pct.toFixed(2)+'%');
  sv('pp-roe',(roe>=0?'+':'')+roe.toFixed(2)+'%');
  sv('pp-fee','-$'+fees.toFixed(3));
  ['pp-usdt','pp-pct','pp-roe'].forEach(id=>{const el=$(id);if(el)el.className='cres-cv '+(id==='pp-usdt'?usdt>=0:id==='pp-pct'?pct>=0:roe>=0)?'up':'dn';});

  if(!e1||!e2)return;
  const totSz=s1+s2+(e3?s3:0);
  const avg=(e1*s1+e2*s2+(e3?e3*s3:0))/totSz;
  const r=$('d-res');if(r)r.style.display='block';
  sv('d-avg','$'+avg.toFixed(4));sv('d-tot','$'+totSz.toFixed(2)+' USDT');
}
function doMt(){
  const dir=$('mt-dir')?.value,entry=+$('mt-e')?.value,sl=+$('mt-sl')?.value,sz=+$('mt-sz')?.value||500,lev=+$('mt-lev')?.value||10;
  if(!entry||!sl)return;
  const risk=Math.abs(entry-sl);
  const tgts=dir==='long'?[entry+risk,entry+risk*2,entry+risk*3]:[entry-risk,entry-risk*2,entry-risk*3];
  const res=$('mt-res');if(res)res.style.display='block';
  const body=$('mt-body');
  if(body)body.innerHTML=tgts.map((t,i)=>`

function addT3(){
  const pair=$('j3-pair')?.value,dir=$('j3-dir')?.value,entry=parseFloat($('j3-entry')?.value),exit=parseFloat($('j3-exit')?.value);
  const size=parseFloat($('j3-size')?.value)||100,lev=parseFloat($('j3-lev')?.value)||1;
  const setup=$('j3-setup')?.value,tf=$('j3-tf')?.value,emo=$('j3-emo')?.value,note=$('j3-note')?.value;
  if(!entry||!exit){alert('Isi entry dan exit!');return;}
  const pnlPct=dir==='long'?(exit-entry)/entry*100:(entry-exit)/entry*100;
  const pnlU=size*(pnlPct/100)*lev;
  T.trades.unshift({pair,dir,entry,exit,size,lev,setup,tf,emo,note,pnlPct,pnlU,date:new Date().toLocaleString()});
  if($('j3-entry'))$('j3-entry').value=''; if($('j3-exit'))$('j3-exit').value=''; if($('j3-note'))$('j3-note').value='';
  buildJ3(); sv('sb-j',T.trades.length+' trades');
}
function buildJ3(){
  const tr=T.trades;
  const wins=tr.filter(t=>t.pnlU>0),losses=tr.filter(t=>t.pnlU<=0);
  const wr=tr.length?(wins.length/tr.length*100).toFixed(1):0;
  const tPnl=tr.reduce((a,t)=>a+t.pnlU,0);
  const aW=wins.length?(wins.reduce((a,t)=>a+t.pnlU,0)/wins.length).toFixed(2):0;
  const aL=losses.length?Math.abs(losses.reduce((a,t)=>a+t.pnlU,0)/losses.length).toFixed(2):0;
  const pf=aL>0?(parseFloat(aW)/parseFloat(aL)).toFixed(2):'—';
  const js=$('jstats3');
  if(js)js.innerHTML=[
    {lb:'WIN RATE',v:`${wr}%`,c:parseFloat(wr)>=50?'var(--g)':'var(--r)',s:`${wins.length}W / ${losses.length}L`},
    {lb:'TOTAL PnL',v:`${tPnl>=0?'+':''}$${Math.abs(tPnl).toFixed(2)}`,c:tPnl>=0?'var(--g)':'var(--r)',s:'All trades'},
    {lb:'AVG WIN',v:`+$${aW}`,c:'var(--g)',s:'Per winner'},
    {lb:'AVG LOSS',v:`-$${aL}`,c:'var(--r)',s:'Per loser'},
    {lb:'PROFIT FACTOR',v:pf,c:parseFloat(pf)>=1.5?'var(--g)':parseFloat(pf)>=1?'var(--a)':'var(--r)',s:'P:F ratio'},
  ].map(s=>`<div style="background:var(--bg3);padding:7px 8px"><div style="font-size:6px;color:var(--d);letter-spacing:1px;font-family:'Rajdhani';font-weight:700">${s.lb}</div><div style="font-family:'Orbitron';font-size:12px;font-weight:700;margin-top:3px;color:${s.c}">${s.v}</div><div style="font-size:6px;color:var(--d);margin-top:1px">${s.s}</div></div>`).join('');
  const el=$('j3-list');
  if(!el)return;
  if(!tr.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--d);font-size:8px">No trades recorded yet. Add your first trade!</div>';return;}
  el.innerHTML=tr.map(t=>`<div class="je">
    <div class="je-hd"><div><span class="je-pair">${t.pair}</span><span style="font-size:6px;color:var(--d);margin-left:5px">${t.dir.toUpperCase()} ${t.lev}x · ${t.tf} · ${t.setup}</span></div><div class="je-pnl ${t.pnlU>=0?'up':'dn'}">${t.pnlU>=0?'+':''}$${Math.abs(t.pnlU).toFixed(2)} (${t.pnlPct>=0?'+':''}${t.pnlPct.toFixed(2)}%)</div></div>
    <div class="je-meta">${t.date} · Entry: ${t.entry} → Exit: ${t.exit} · $${t.size} · ${t.emo}</div>
    ${t.note?`<div class="je-note">"${t.note}"</div>`:''}
  </div>`).join('');
}

let _tgJustOpened = false;

function tgToggle(id, e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  // Close all first
  document.querySelectorAll('.tg.open').forEach(x => x.classList.remove('open'));
  if (!isOpen) {
    el.classList.add('open');
    _tgJustOpened = true;
    setTimeout(() => { _tgJustOpened = false; }, 50);
  }
}
function tgClose() {
  document.querySelectorAll('.tg.open').forEach(el => el.classList.remove('open'));
}
// Close when clicking outside — only if not just opened
document.addEventListener('click', function(e) {
  if (_tgJustOpened) return;
  if (!e.target.closest('.tg')) tgClose();
});

// ═══ SIMULATION ENGINE ═══
function simulate(){
  PAIRS.forEach(p=>{
    const d=T.prices[p.s];
    const vol=d.p*.00045, drift=d.c>0?.0002:-.0002;
    d.p=Math.max(d.p*.82,d.p+(Math.random()-.497)*vol*2+vol*drift*10);
    d.c+=(Math.random()-.5)*.028;
    d.c=Math.max(-22,Math.min(28,d.c));
  });
  T.dom+=(Math.random()-.5)*.018;
  T.fg.v=Math.max(10,Math.min(95,T.fg.v+(Math.random()-.5)*.28));
  T.alt=Math.max(10,Math.min(95,T.alt+(Math.random()-.5)*.18));
  T.oi=Math.max(8,Math.min(28,T.oi+(Math.random()-.5)*.035));
  T.fund=Math.max(-.001,Math.min(.002,T.fund+(Math.random()-.4)*.00001));
  T.lsr=Math.max(.5,Math.min(1.8,T.lsr+(Math.random()-.5)*.005));
  T.gas=Math.max(8,Math.min(80,T.gas+(Math.random()-.5)*1.2));
  T.updates++;

  buildTicker();
  if(panels['watchlist']) buildWL();
  if(panels['mstrip'])    updateMstripAll();
  if(panels['heatmap'])   renderHeatmap($('pb-heatmap'),panels['heatmap']);
  if(panels['orderbook']) buildOB2();
  sv('sb-u', T.updates.toLocaleString());
  sv('sb-l', (Math.random()*14+3).toFixed(0)+'ms');
}

// ═══ BOOTSTRAP ═══
fetchRealData();                              // Try real API first
setInterval(fetchRealData, 60000);           // Refresh every 60s
setInterval(simulate, 1800);                 // Sim tick
setInterval(()=>{if(panels['orderbook'])buildOB2();if(panels['watchlist']&&panels['watchlist']._wltab==='ob')buildOBw();},3200);
setTimeout(()=>setLayout('trading'), 500);   // Default layout

console.log('TRENOVA TERMINAL v6 — Bloomberg Pro — Loaded');
</script>
